<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <nav>
        <div class="left_nav">
             <div class="left_nav_1">
                <img src="web_icon.png" alt="">
                <h3>TaskFlow</h3>
             </div>
             <div class="left_nav_bar"></div>
             <div class="left_nav_3">
                <h5>5</h5>
                <h5>/</h5>
                <h5>10</h5>
                <h4>complete</h4>
                <div class="nav_conatainer">
                    <div class="progress-bar"></div>
                </div> 
             </div>
        </div>
        <div class="right_nav">
            <input type="text" placeholder="Search tasks....">
            <button><i class="ri-add-line"></i>Add Task</button>
            <i class="ri-notification-3-line notify"></i>
            <i class="ri-settings-4-line seting"></i>
            <div class="right_nav_bar"></div>
            <div class="profile">
                <img src="profile_pic.png" alt="">
            </div>
        </div>
    </nav>


    <section class="section">

        <div class="left_main_div">
            <div class="left_main_div_top">
                <div class="left_main_div_top_left">
                <div class="circle"></div>
                <h5>To Do</h5>
                <h6>count:</h6>
                <h6>5</h6>
                </div>
                <i class="ri-add-line plus"></i>
            </div>
            <div class="left_main_div_bottom"></div>
        </div>

        <div class="mid_main_div">
            <div class="mid_main_div_top">
                <div class="mid_main_div_top_left">
                <div class="mid_circle"></div>
                <h5>In Progress</h5>
                </div>
                <div class="mid_main_div_right">
                <h6>count:<span>6</span></h6>
                </div>
            </div>
            <div class="mid_main_div_bottom"></div>
        </div>


        <div class="right_main_div">
            <div class="right_main_div_top">
                <div class="right_main_div_top_left">
                <div class="right_circle"></div>
                <h5>Done</h5>
                </div>
                <div class="right_main_div_top_right">
                    <h6>count:<span>6</span></h6>
                </div>
            </div>
            <div class="right_main_div_bottom"></div>
        </div>
    </section>
    <script src="Script.js"></script>
</body>
</html>
